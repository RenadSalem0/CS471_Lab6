{% extends "layouts/base.html" %}

{% block title %} Book List {% endblock title %}

{% block content %}
<h2>Books List</h2>

<ul>
    {% for book in books %}
        <li>
            ID: {{ book.id }} |
            Title: {{ book.title }} |
            Author: {{ book.author }}
        </li>
    {% endfor %}
</ul>
{% endblock content %}
